server:
  port: 8080
  read_timeout: 5s
  write_timeout: 10s
  shutdown_timeout: 15s

database:
  host: mysql
  port: 3306
  name: team_tasks
  user: app
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 5m

redis:
  addr: redis:6379
  db: 0
  pool_size: 10
  task_list_ttl: 5m

auth:
  jwt_expiry: 24h

rate_limit:
  requests_per_minute: 100

circuit_breaker:
  max_requests: 5
  interval: 60s
  timeout: 30s

email_service:
  base_url: http://email-mock:8081
