coverage:
  precision: 2
  round: down
  range: "70...100"
  status:
    project:
      default:
        target: 85%       # fail PR if overall coverage drops below 85%
        threshold: 1%     # allow up to 1% regression before blocking
    patch:
      default:
        target: 85%
        threshold: 1%
        paths:
          - "internal/"
          - "cmd/"
          - "pkg/logger/"

flags:
  unittests:
    paths:
      - internal/service/
      - internal/handler/
      - internal/circuitbreaker/
      - internal/middleware/
  integration:
    paths:
      - internal/handler/
      - internal/middleware/
      - internal/circuitbreaker/
      - internal/storage/
      - internal/app/
      - internal/config/
      - internal/domain/
      - internal/metrics/
      - pkg/logger/

ignore:
  - "cmd/"
  - "pkg/slogx/"
  - "scripts/**"
  - "internal/handler/api/"
  - "internal/**/mocks/"

parsers:
  go:
    partials_as_hits: false

comment:
  layout: "header, diff, flags, components"
  behavior: default
  require_changes: false
